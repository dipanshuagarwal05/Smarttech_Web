<style>

    html, body {

        padding: 0;
        overflow-x: hidden;
    }

    html,

        scrollbar-width: none;
        -ms-overflow-style: none;
    }

    html::-webkit-scrollbar,

        width: 0;
        height: 0;
        display: none;
    }

    body {

    }

    header {

        top: 0;
        left: 0;

        z-index: 1001;
        overflow-y: auto;
        scrollbar-width: none;
        -ms-overflow-style: none;
    }

    header::-webkit-scrollbar {
        width: 0;
        height: 0;
        display: none;
    }

    nav {
        display: flex;
        flex-direction: column;
        align-items: stretch;
        gap: 1rem;
        width: 100%;
        box-sizing: border-box;
        padding: 2rem 1.5rem;
    }

    nav ul {
        list-style: none;
        display: flex;
        flex-direction: column;
        gap: 0.7rem;
        margin: 0;
        padding: 0;
    }

    nav ul li a {
        text-decoration: none;
        color: var(--shell-green-dark);
        font-weight: 700;
        font-size: 0.98rem;
        padding: 0.85rem 1rem;
        border-radius: 16px;
        background: #f2fbf2;
        transition: all 0.25s ease;
        border: 1px solid transparent;
        display: block;
    }

    nav ul li a:hover,
    nav ul li a:focus,
    nav ul li a.active {
        color: var(--shell-white);
        background: var(--shell-green-main);
        border-color: var(--shell-green-main);
    }

    main {
        margin-left: var(--shell-sidebar-width);
    }

    footer {
        margin-left: var(--shell-sidebar-width);
        background: var(--shell-green-dark);
        color: var(--shell-white);
        padding: 4rem 5%;
        text-align: center;
    }

    .footer-content {
        max-width: 800px;
        margin: 0 auto;
        line-height: 1.8;
    }

    .footer-content p {
        margin: 0.4rem 0;
        opacity: 0.95;
    }

    footer p {
        margin: 0;
        font-size: 1rem;
        opacity: 0.8;
    }

    .mobile-header {
        display: none;
    }

    .mobile-header-actions {
        display: flex;
        align-items: center;
        gap: 0.7rem;
    }

    .whatsapp-icon-btn {
        width: 40px;
        height: 40px;
        border-radius: 50%;
        background: linear-gradient(135deg, #25d366, #1ebe5d);
        color: #ffffff;
        display: inline-flex;
        align-items: center;
        justify-content: center;
        border: 2px solid rgba(255, 255, 255, 0.9);
        transition: transform 0.2s ease, filter 0.2s ease;
        text-decoration: none;
    }

    .whatsapp-icon-btn svg {
        width: 21px;
        height: 21px;
        fill: currentColor;
        transform: translateX(0.5px);
    }

    .whatsapp-icon-btn:hover,
    .whatsapp-icon-btn:focus-visible {
        transform: translateY(-2px);
        filter: saturate(1.05);
    }

    .desktop-whatsapp-wrap {
        margin-top: auto;
        padding-top: 2rem;
        padding-bottom: 0.5rem;
    }

    .desktop-whatsapp {
        width: 44px;
        height: 44px;
    }

    @media (max-width: 992px) {
        .desktop-whatsapp-wrap {
            display: none;
        }
    }

    .sidebar-overlay {
        display: none;
    }

    @media (max-width: 992px) {
        header {
            transform: translateX(-100%);
            transition: transform 0.3s ease;
            z-index: 1005;
            overflow-y: auto;
        }

        header.open {
            transform: translateX(0);
            box-shadow: 2px 0 20px rgba(0, 0, 0, 0.2);
        }

        .mobile-header {
            display: flex !important;
        }

        main,
        footer {
            margin-left: 0;
        }
    }
</style>

<script>
    (function () {
        const toggle = document.getElementById('mobileToggle');
        const sidebar = document.getElementById('sidebar');
        const overlay = document.getElementById('sidebarOverlay');
        const closeBtn = document.getElementById('closeSidebar');

        function openNav() {
            if (sidebar) sidebar.classList.add('open');
            if (overlay) overlay.style.display = 'block';
            document.body.style.overflow = 'hidden'; 
        }

        function closeNav() {
            if (sidebar) sidebar.classList.remove('open');
            if (overlay) overlay.style.display = 'none';
            document.body.style.overflow = '';
        }

        if (toggle) toggle.addEventListener('click', openNav);
        if (closeBtn) closeBtn.addEventListener('click', closeNav);
        if (overlay) overlay.addEventListener('click', closeNav);

        if (sidebar) {
            const links = sidebar.querySelectorAll('a');
            links.forEach(link => {
                link.addEventListener('click', closeNav);
            });
        }

        document.addEventListener('click', function (e) {
            const link = e.target.closest('a[data-contact="true"]');
            if (!link) return;
            if (e.defaultPrevented) return;

            e.preventDefault();
            closeNav();

            const isHomePage = window.location.pathname.endsWith('/index.html') || window.location.pathname.endsWith('/');

            if (isHomePage) {
                document.dispatchEvent(new CustomEvent('smartech:openContactModal'));
                return;
            }

            sessionStorage.setItem('smartechOpenContactModal', '1');
            window.location.href = link.href;
        });

        function handleResize() {
            if (window.innerWidth <= 992) {
                if (closeBtn) closeBtn.style.display = 'block';
            } else {
                if (closeBtn) closeBtn.style.display = 'none';
                closeNav();
            }
        }

        handleResize(); 
        window.addEventListener('resize', handleResize);
    })();
</script>
